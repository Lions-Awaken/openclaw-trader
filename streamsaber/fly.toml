app = 'tu-streamsaber'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = 'streamsaber_data'
  destination = '/data'

[[vm]]
  size = 'shared-cpu-2x'
  memory = '1gb'
