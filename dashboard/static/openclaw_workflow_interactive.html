<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADVERSARIAL ENSEMBLE — INTERACTIVE WORKFLOW</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* ================================================================
   BASE — exact openclaw palette + Orbitron
   ================================================================ */
:root {
  --bg:         #050508;
  --bg-card:    rgba(10, 10, 18, 0.95);
  --border:     rgba(255, 255, 255, 0.08);
  --cyan:       #22d3ee;
  --purple:     #a855f7;
  --green:      #33ff88;
  --yellow:     #facc15;
  --orange:     #fb923c;
  --red:        #ff3344;
  --amber:      #ffaa22;
  --text:       #e8e8f0;
  --dim:        rgba(232, 232, 240, 0.35);
  --glow-cyan:  0 0 10px rgba(34,211,238,0.45), 0 0 30px rgba(34,211,238,0.2), 0 0 60px rgba(34,211,238,0.08);
  --glow-green: 0 0 8px rgba(51,255,136,0.35), 0 0 20px rgba(51,255,136,0.12);
  --glow-purple:0 0 10px rgba(168,85,247,0.45), 0 0 30px rgba(168,85,247,0.2);
  --glow-amber: 0 0 8px rgba(255,170,34,0.4), 0 0 20px rgba(255,170,34,0.15);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Orbitron', monospace, sans-serif;
  font-size: 26px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(34,211,238,0.2); border-radius: 2px; }

/* ================================================================
   OUTER SHELL
   ================================================================ */
.shell {
  max-width: 1100px;
  margin: 0 auto;
  padding: 20px 16px 40px;
}

/* ================================================================
   HEADER
   ================================================================ */
.widget-header {
  border: 2px solid rgba(34,211,238,0.5);
  border-radius: 12px;
  padding: 20px 28px 16px;
  background: var(--bg-card);
  box-shadow: var(--glow-cyan);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}

.widget-title {
  font-size: 2.1rem;
  font-weight: 900;
  letter-spacing: 2px;
  text-transform: uppercase;
  background: linear-gradient(135deg, var(--cyan), var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.widget-subtitle {
  font-size: 1.36rem;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-top: 4px;
}

.step-counter {
  font-size: 1.5rem;
  color: var(--cyan);
  letter-spacing: 1px;
  font-weight: 700;
  padding: 12px 28px;
  border: 1px solid rgba(34,211,238,0.3);
  border-radius: 8px;
  background: rgba(34,211,238,0.05);
  white-space: nowrap;
}

/* ================================================================
   NODE DIAGRAM
   ================================================================ */
.diagram-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px 16px;
  margin-bottom: 14px;
  position: relative;
  overflow: hidden;
}

.diagram-area {
  position: relative;
  width: 100%;
  /* height set dynamically via JS */
}

.diagram-svg {
  width: 100%;
  display: block;
}

/* ================================================================
   GROUP LABELS
   ================================================================ */
.group-label {
  font-size: 1.16rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  font-weight: 700;
  opacity: 0.4;
}

/* ================================================================
   NODES — each is a <g> in SVG
   ================================================================ */
.node-circle {
  transition: all 0.35s ease;
  cursor: pointer;
}

.node-circle:hover { opacity: 0.85; }

/* ================================================================
   DETAIL PANEL
   ================================================================ */
.detail-panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 44px 48px;
  margin-bottom: 14px;
  min-height: 280px;
  position: relative;
  overflow: hidden;
}

.detail-panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--step-color, var(--cyan)), transparent);
  transition: background 0.4s;
}

.detail-step-num {
  font-size: 1.2rem;
  color: var(--dim);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.detail-title {
  font-size: 2.2rem;
  font-weight: 900;
  letter-spacing: 1.5px;
  color: var(--step-color, var(--cyan));
  text-transform: uppercase;
  margin-bottom: 12px;
  transition: color 0.3s;
  text-shadow: 0 0 20px var(--step-color, var(--cyan));
}

.detail-desc {
  font-size: 1.56rem;
  color: rgba(232,232,240,0.8);
  line-height: 1.75;
  margin-bottom: 16px;
  text-transform: none;
  font-family: 'Orbitron', monospace;
  font-weight: 400;
}

.detail-meta {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

.meta-chip {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.meta-chip .chip-label {
  font-size: 1.16rem;
  color: var(--dim);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

.meta-chip .chip-value {
  font-size: 1.56rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.chip-value.table-name {
  color: var(--purple);
  font-size: 1.44rem;
}

.chip-value.cost-free { color: var(--green); }
.chip-value.cost-gpu  { color: var(--cyan); }
.chip-value.cost-api  { color: var(--amber); }

/* ================================================================
   DB TABLE STRIP
   ================================================================ */
.db-strip-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 28px 32px;
  margin-bottom: 14px;
}

.db-strip-label {
  font-size: 1.16rem;
  color: var(--dim);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.db-table-strip {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
}

.db-badge {
  padding: 8px 20px;
  border-radius: 6px;
  font-size: 1.24rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-weight: 700;
  border: 1px solid rgba(255,255,255,0.07);
  background: rgba(255,255,255,0.03);
  color: var(--dim);
  transition: all 0.3s ease;
  cursor: default;
}

.db-badge.active {
  border-color: rgba(168,85,247,0.7);
  background: rgba(168,85,247,0.12);
  color: var(--purple);
  box-shadow: 0 0 8px rgba(168,85,247,0.3), 0 0 20px rgba(168,85,247,0.1);
}

/* ================================================================
   PROGRESS BAR
   ================================================================ */
.progress-track {
  height: 3px;
  background: rgba(255,255,255,0.06);
  border-radius: 2px;
  margin-bottom: 14px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--cyan), var(--purple));
  border-radius: 2px;
  transition: width 0.4s ease;
  box-shadow: var(--glow-cyan);
}

/* ================================================================
   NAVIGATION
   ================================================================ */
.nav-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
}

.nav-btn {
  padding: 18px 44px;
  border-radius: 8px;
  border: 1px solid rgba(34,211,238,0.35);
  background: rgba(34,211,238,0.04);
  color: var(--cyan);
  font-family: 'Orbitron', monospace;
  font-size: 1.44rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s ease;
}

.nav-btn:hover {
  background: rgba(34,211,238,0.12);
  border-color: var(--cyan);
  box-shadow: var(--glow-cyan);
}

.nav-btn:disabled {
  opacity: 0.25;
  cursor: not-allowed;
}

.nav-btn.playing {
  border-color: rgba(255,170,34,0.6);
  background: rgba(255,170,34,0.08);
  color: var(--amber);
  box-shadow: var(--glow-amber);
}

.nav-btn.playing:hover {
  background: rgba(255,170,34,0.14);
}

.nav-btn.stop-btn {
  border-color: rgba(255,51,68,0.5);
  background: rgba(255,51,68,0.05);
  color: var(--red);
}

.nav-btn.stop-btn:hover {
  background: rgba(255,51,68,0.12);
  border-color: var(--red);
  box-shadow: 0 0 10px rgba(255,51,68,0.3);
}

.nav-btn.restart-btn {
  border-color: rgba(168,85,247,0.5);
  background: rgba(168,85,247,0.05);
  color: var(--purple);
}

.nav-btn.restart-btn:hover {
  background: rgba(168,85,247,0.12);
  border-color: var(--purple);
  box-shadow: var(--glow-purple);
}

.dot-progress {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 420px;
}

.dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  transition: all 0.3s ease;
  cursor: pointer;
}

.dot.visited {
  background: rgba(51,255,136,0.35);
}

.dot.active {
  background: var(--cyan);
  box-shadow: 0 0 6px var(--cyan), 0 0 12px rgba(34,211,238,0.4);
  transform: scale(1.35);
}

/* ================================================================
   ANIMATION — step change fade
   ================================================================ */
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.detail-panel.animating {
  animation: fadeSlideIn 0.3s ease forwards;
}

/* ================================================================
   GROUP COLOR MAP (used in SVG via JS)
   ================================================================ */
/* groups: pre-market, scanner, tumbler, execution, shadow, calibration, meta */
</style>
</head>
<body>
<div class="shell">

  <!-- HEADER -->
  <div class="widget-header">
    <div>
      <div class="widget-title">Adversarial Ensemble — Interactive Workflow</div>
      <div class="widget-subtitle">20-step pipeline walkthrough &nbsp;|&nbsp; click any node to jump</div>
    </div>
    <div class="step-counter" id="stepCounter">STEP 1 OF 20</div>
  </div>

  <!-- PROGRESS BAR -->
  <div class="progress-track">
    <div class="progress-fill" id="progressFill" style="width: 5%;"></div>
  </div>

  <!-- NODE DIAGRAM -->
  <div class="diagram-card">
    <svg id="diagramSvg" class="diagram-svg" viewBox="0 0 1920 640" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- glow filters -->
        <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="8" result="blur"/>
          <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
        <filter id="glowGreen" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="6" result="blur"/>
          <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
        <filter id="glowAmber" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="8" result="blur"/>
          <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
        <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
          <feGaussianBlur stdDeviation="12" result="blur"/>
          <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
        <!-- Ball glow -->
        <radialGradient id="ballGrad" cx="50%" cy="30%" r="60%">
          <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
          <stop offset="60%" stop-color="#22d3ee" stop-opacity="0.85"/>
          <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
        </radialGradient>
        <filter id="ballGlow" x="-200%" y="-200%" width="500%" height="500%">
          <feGaussianBlur stdDeviation="16" result="blur"/>
          <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
      </defs>
      <!-- Edges and nodes rendered by JS -->
      <g id="edgesGroup"></g>
      <g id="nodesGroup"></g>
      <!-- Ball -->
      <g id="ballGroup">
        <circle id="ballOuter" cx="0" cy="0" r="32" fill="rgba(34,211,238,0.15)" filter="url(#ballGlow)"/>
        <circle id="ballRing" cx="0" cy="0" r="20" fill="none" stroke="#22d3ee" stroke-width="3" opacity="0.6"/>
        <circle id="ballCore" cx="0" cy="0" r="12" fill="url(#ballGrad)" filter="url(#softGlow)"/>
      </g>
      <!-- Group labels rendered by JS -->
      <g id="labelsGroup"></g>
    </svg>
  </div>

  <!-- DETAIL PANEL -->
  <div class="detail-panel" id="detailPanel">
    <div class="detail-step-num" id="detailStepNum">STEP 1 OF 20 — PRE-MARKET</div>
    <div class="detail-title" id="detailTitle">HEALTH CHECK</div>
    <div class="detail-desc" id="detailDesc">Loading...</div>
    <div class="detail-meta">
      <div class="meta-chip">
        <span class="chip-label">Writes To</span>
        <span class="chip-value table-name" id="detailTable">—</span>
      </div>
      <div class="meta-chip">
        <span class="chip-label">API Cost</span>
        <span class="chip-value" id="detailCost">—</span>
      </div>
      <div class="meta-chip">
        <span class="chip-label">Group</span>
        <span class="chip-value" id="detailGroup">—</span>
      </div>
    </div>
  </div>

  <!-- DB TABLE STRIP -->
  <div class="db-strip-card">
    <div class="db-strip-label">DB Tables — active step highlighted</div>
    <div class="db-table-strip" id="dbStrip"></div>
  </div>

  <!-- NAV: PREV | RESTART | [dots] | PLAY/PAUSE | STOP | NEXT -->
  <div class="nav-row">
    <button class="nav-btn" id="btnPrev" onclick="navigate(-1)">&#9664; PREV</button>
    <button class="nav-btn restart-btn" id="btnRestart" onclick="restartPlay()">&#x27F2; RESTART</button>
    <div class="dot-progress" id="dotProgress"></div>
    <button class="nav-btn" id="btnPlayPause" onclick="togglePlayPause()">&#9654; PLAY</button>
    <button class="nav-btn stop-btn" id="btnStop" onclick="stopPlay()">&#9632; STOP</button>
    <button class="nav-btn" id="btnNext" onclick="navigate(1)">NEXT &#9654;</button>
  </div>

</div><!-- /shell -->

<script>
/* ================================================================
   DATA
   ================================================================ */
const STEPS = [
  { id: 1,  title: "HEALTH CHECK",        desc: "59 automated checks across 13 groups. Validates Ollama, Supabase, Alpaca, Claude API, crontab drift, data freshness. Alerts Slack on failure.", table: "system_health",        cost: "Free",            group: "pre-market"  },
  { id: 2,  title: "CATALYST INGEST",     desc: "5-source market catalyst detection — Finnhub news + insiders, SEC EDGAR, QuiverQuant congressional trades, yfinance signals, FRED macro indicators. Embeds via Ollama for RAG retrieval.", table: "catalyst_events",      cost: "Free",            group: "pre-market"  },
  { id: 3,  title: "FORM 4 INGEST",       desc: "SEC EDGAR Form 4 insider purchase filings. Scores by total value, ownership change, cluster count, filer title. CFO buys = strongest signal.", table: "form4_signals",        cost: "Free",            group: "pre-market"  },
  { id: 4,  title: "SCANNER SETUP",       desc: "Loads active profile (CONGRESS_MIRROR), checks circuit breakers, verifies Alpaca account equity and buying power. Builds 39-ticker watchlist.", table: "pipeline_runs",        cost: "Free",            group: "scanner"     },
  { id: 5,  title: "T1 — SIGNAL SCORING", desc: "39 tickers scored against 6 binary signals: Trend, Momentum, Volume, Catalyst, Sentiment, Flow. Score 0–6. Only tickers scoring ≥ 3 advance. Pure computation, no AI.", table: "signal_evaluations",  cost: "Free",            group: "scanner"     },
  { id: 6,  title: "SIGNAL ENRICHMENT",   desc: "Candidates enriched with options flow data (3-day lookback) and Form 4 insider purchases (14-day lookback). Adds options_flow_net and form4_insider_score to each candidate.", table: "signal_evaluations",  cost: "Free",            group: "scanner"     },
  { id: 7,  title: "T2 — FUNDAMENTAL",    desc: "RAG retrieves similar past inference chains and trade learnings via pgvector. Congressional disclosures get confidence boost if filed within 40 days. Hard veto if sentiment < -0.5.", table: "inference_chains",    cost: "Free",            group: "tumbler"     },
  { id: 8,  title: "T3 — FLOW & CROSS-ASSET", desc: "First LLM call — Ollama qwen2.5:3b on ridley GPU. Analyzes how this setup compares to past chains and outcomes. Shadow context injected for shadow profiles. Confidence ±0.10.", table: "inference_chains",    cost: "Free (local GPU)", group: "tumbler"     },
  { id: 9,  title: "T4 — PATTERN MATCH",  desc: "Claude Haiku matches against known pattern templates with documented outcomes. Evaluates quality and coherence of the full trade thesis. Confidence ±0.10.", table: "inference_chains",    cost: "~$0.001",         group: "tumbler"     },
  { id: 10, title: "T5 — COUNTERFACTUAL", desc: "Claude Sonnet as devil's advocate — constructs the strongest argument AGAINST the trade. Asymmetric: can drop confidence by 0.15 but raise only 0.05. Calibration factor applied.", table: "inference_chains",    cost: "~$0.005",         group: "tumbler"     },
  { id: 11, title: "EXECUTION GATE",      desc: "Trade executes ONLY if: decision = enter/strong_enter, confidence ≥ 0.60, and ≥ 3 tumblers completed. ATR-based position sizing, market buy + stop-loss.", table: "trade_decisions",     cost: "Free",            group: "execution"   },
  { id: 12, title: "BUDGET GATE",         desc: "Controls which shadow agents run. ≥40% Claude budget: all 6. 20–40%: Regime Watcher + Form 4 + Kronos. <20%: Kronos only (zero API cost).", table: "cost_ledger",         cost: "Free",            group: "shadow"      },
  { id: 13, title: "SKEPTIC",             desc: "Maximally conservative adversarial reviewer. Requires overwhelming evidence. Confidence floors HIGH. Heavily penalizes momentum-chasing. Graded on Conditional Brier Score.", table: "shadow_divergences",  cost: "Claude API",      group: "shadow"      },
  { id: 14, title: "CONTRARIAN",          desc: "Assumes the trade is wrong. Overweights sector rotation, institutional distribution, price-fundamental divergence. Graded on Regime-Conditional IC.", table: "shadow_divergences",  cost: "Claude API",      group: "shadow"      },
  { id: 15, title: "REGIME WATCHER",      desc: "Ignores the ticker entirely. Only question: 'Is this a good time to enter ANY long position?' Evaluates SPY trend, VIX, yield curve, credit spreads. Stops at T3 — no Claude cost.", table: "shadow_divergences",  cost: "Free (Ollama)",   group: "shadow"      },
  { id: 16, title: "OPTIONS FLOW",        desc: "Momentum-focused. Primary signal: unusual options activity — sweeps, blocks, dark pool prints. Alpha decay 1–5 days. Graded on 5-day forward return.", table: "shadow_divergences",  cost: "Claude API",      group: "shadow"      },
  { id: 17, title: "FORM 4 INSIDER",      desc: "Fundamentals-anchored. Primary signal: Form 4 purchase filings by CEOs/CFOs/board members. Cluster buys weighted heavily. Graded on 15-day forward return.", table: "shadow_divergences",  cost: "Claude API",      group: "shadow"      },
  { id: 18, title: "KRONOS TECHNICALS",   desc: "Pure price pattern agent. 252 daily OHLCV candles → Kronos foundation model → 50 Monte Carlo paths → bullish probability at 10-day horizon. No news, no fundamentals. Local GPU only.", table: "shadow_divergences",  cost: "Free (GPU)",      group: "shadow"      },
  { id: 19, title: "CALIBRATOR",          desc: "Sunday weekly. Grades all ungraded shadow divergences. Kronos: directional accuracy at 10 days. LLM agents: inference_chains.actual_outcome. DWM weight = 1.0 × (1 + 0.5 × (fitness − median)), clamped [0.05, 3.0].", table: "strategy_profiles",   cost: "Free",            group: "calibration" },
  { id: 20, title: "META DAILY",          desc: "1:30 PM weekdays. Claude Sonnet reviews shadow divergences. Flags unanimous dissent (all 6 shadows disagreed with live). Output becomes RAG context for future T2 tumbler calls.", table: "meta_reflections",    cost: "~$0.02",          group: "meta"        },
];

/* All unique DB tables to show in strip */
const ALL_TABLES = [
  "system_health", "catalyst_events", "form4_signals", "pipeline_runs",
  "signal_evaluations", "inference_chains", "trade_decisions", "cost_ledger",
  "shadow_divergences", "strategy_profiles", "meta_reflections"
];

/* Group colors */
const GROUP_COLOR = {
  "pre-market":  "#22d3ee",   /* cyan */
  "scanner":     "#33ff88",   /* green */
  "tumbler":     "#a855f7",   /* purple */
  "execution":   "#fb923c",   /* orange */
  "shadow":      "#ffaa22",   /* amber */
  "calibration": "#f472b6",   /* pink */
  "meta":        "#facc15",   /* yellow */
};

const GROUP_LABEL = {
  "pre-market":  "PRE-MARKET",
  "scanner":     "SCANNER",
  "tumbler":     "TUMBLER CHAIN",
  "execution":   "EXECUTION",
  "shadow":      "SHADOW AGENTS",
  "calibration": "CALIBRATION",
  "meta":        "META",
};

/* ================================================================
   NODE LAYOUT — viewBox 1920×640
   All positions are doubled from the original 960×320 layout.
   ================================================================ */
const SVG_W = 1920;
const SVG_H = 640;
const R = 22;   /* node radius — doubled from 11 */

// Layout: [cx, cy] for each step (index 0 = step 1) — all coords doubled
const NODE_POS = [
  /* Pre-market row y=110 */
  [ 180, 110],   // 1  Health Check
  [ 460, 110],   // 2  Catalyst Ingest
  [ 740, 110],   // 3  Form 4 Ingest

  /* Scanner row y=230 */
  [ 180, 230],  // 4  Scanner Setup
  [ 460, 230],  // 5  T1 Signal Scoring
  [ 740, 230],  // 6  Signal Enrichment

  /* Tumbler row y=350 */
  [ 280, 350],  // 7  T2 Fundamental
  [ 600, 350],  // 8  T3 Flow
  [ 920, 350],  // 9  T4 Pattern
  [1240, 350],  // 10 T5 Counterfactual

  /* Execution row y=470 */
  [ 960, 470],  // 11 Execution Gate
  [1280, 470],  // 12 Budget Gate

  /* Shadow agents row y=580 */
  [ 220, 580],  // 13 Skeptic
  [ 480, 580],  // 14 Contrarian
  [ 740, 580],  // 15 Regime Watcher
  [1000, 580],  // 16 Options Flow
  [1260, 580],  // 17 Form 4 Insider
  [1520, 580],  // 18 Kronos

  /* Post-market row */
  [1600, 350],  // 19 Calibrator
  [1760, 230],  // 20 Meta Daily
];

/* Edges: pairs of 0-based step indices */
const EDGES = [
  [0,1],[1,2],          // pre-market chain
  [2,3],                // form4 → setup
  [3,4],[4,5],          // scanner chain
  [5,6],                // enrich → T2
  [6,7],[7,8],[8,9],    // tumbler chain
  [9,10],               // T5 → exec gate
  [10,11],              // exec → budget
  // budget → shadow agents
  [11,12],[11,13],[11,14],[11,15],[11,16],[11,17],
  // shadow → calibrator
  [12,18],[13,18],[14,18],[15,18],[16,18],[17,18],
  // calibrator → meta
  [18,19],
  // meta → T2 (feedback loop — dashed)
  [19,6],
];

/* Edges that are feedback loops (rendered dashed) */
const FEEDBACK_EDGES = new Set(['19,6']);

/* ================================================================
   STATE
   ================================================================ */
let currentStep  = 0;   /* 0-based */
let autoTimer    = null;
let isPlaying    = false;
let visitedSteps = new Set([0]);

/* ================================================================
   RENDER DIAGRAM
   ================================================================ */
function renderDiagram() {
  const svg    = document.getElementById('diagramSvg');
  const edgesG = document.getElementById('edgesGroup');
  const nodesG = document.getElementById('nodesGroup');
  const labelsG = document.getElementById('labelsGroup');

  // Clear
  edgesG.innerHTML  = '';
  nodesG.innerHTML  = '';
  labelsG.innerHTML = '';

  /* --- Group background bands (y coords doubled) --- */
  const groupRows = [
    { group: 'pre-market',  y1:  70, y2: 150 },
    { group: 'scanner',     y1: 190, y2: 270 },
    { group: 'tumbler',     y1: 310, y2: 400 },
    { group: 'shadow',      y1: 534, y2: 620 },
  ];

  groupRows.forEach(gr => {
    const color = GROUP_COLOR[gr.group];
    const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x', '8');
    rect.setAttribute('y', gr.y1);
    rect.setAttribute('width', SVG_W - 16);
    rect.setAttribute('height', gr.y2 - gr.y1);
    rect.setAttribute('rx', '12');
    rect.setAttribute('fill', color);
    rect.setAttribute('fill-opacity', '0.03');
    rect.setAttribute('stroke', color);
    rect.setAttribute('stroke-opacity', '0.08');
    rect.setAttribute('stroke-width', '2');
    edgesG.appendChild(rect);

    // group label at right edge
    const text = document.createElementNS('http://www.w3.org/2000/svg','text');
    text.setAttribute('x', SVG_W - 20);
    text.setAttribute('y', (gr.y1 + gr.y2) / 2 + 8);
    text.setAttribute('text-anchor', 'end');
    text.setAttribute('font-family', 'Orbitron, monospace');
    text.setAttribute('font-size', '14');
    text.setAttribute('font-weight', '700');
    text.setAttribute('fill', color);
    text.setAttribute('fill-opacity', '0.4');
    text.setAttribute('letter-spacing', '2');
    text.textContent = GROUP_LABEL[gr.group];
    labelsG.appendChild(text);
  });

  /* --- Execution / calibration / meta labels (coords doubled) --- */
  [
    { group: 'execution',   x: 1190, y: 440 },
    { group: 'calibration', x: 1660, y: 330 },
    { group: 'meta',        x: 1800, y: 214 },
  ].forEach(item => {
    const text = document.createElementNS('http://www.w3.org/2000/svg','text');
    text.setAttribute('x', item.x);
    text.setAttribute('y', item.y);
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('font-family', 'Orbitron, monospace');
    text.setAttribute('font-size', '14');
    text.setAttribute('font-weight', '700');
    text.setAttribute('fill', GROUP_COLOR[item.group]);
    text.setAttribute('fill-opacity', '0.45');
    text.setAttribute('letter-spacing', '2');
    text.textContent = GROUP_LABEL[item.group];
    labelsG.appendChild(text);
  });

  /* --- Edges --- */
  EDGES.forEach(([a, b]) => {
    const isFeedback = FEEDBACK_EDGES.has(`${a},${b}`);
    const [x1, y1] = NODE_POS[a];
    const [x2, y2] = NODE_POS[b];

    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x1);
    line.setAttribute('y1', y1);
    line.setAttribute('x2', x2);
    line.setAttribute('y2', y2);

    const bothVisited = visitedSteps.has(a) && visitedSteps.has(b);
    const isActive    = a === currentStep || b === currentStep;

    if (isFeedback) {
      line.setAttribute('stroke', GROUP_COLOR['meta']);
      line.setAttribute('stroke-opacity', '0.25');
      line.setAttribute('stroke-width', '2');
      line.setAttribute('stroke-dasharray', '6 8');
    } else if (isActive) {
      line.setAttribute('stroke', '#22d3ee');
      line.setAttribute('stroke-opacity', '0.6');
      line.setAttribute('stroke-width', '3');
    } else if (bothVisited) {
      line.setAttribute('stroke', '#33ff88');
      line.setAttribute('stroke-opacity', '0.2');
      line.setAttribute('stroke-width', '2');
    } else {
      line.setAttribute('stroke', 'rgba(255,255,255,0.07)');
      line.setAttribute('stroke-width', '2');
    }

    edgesG.appendChild(line);
  });

  /* --- Nodes --- */
  STEPS.forEach((step, i) => {
    const [cx, cy] = NODE_POS[i];
    const color     = GROUP_COLOR[step.group];
    const isActive  = i === currentStep;
    const isVisited = visitedSteps.has(i) && !isActive;

    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('class', 'node-circle');
    g.setAttribute('data-step', i);
    g.style.cursor = 'pointer';

    // Outer glow ring (active only)
    if (isActive) {
      const glowRing = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      glowRing.setAttribute('cx', cx);
      glowRing.setAttribute('cy', cy);
      glowRing.setAttribute('r', R + 14);
      glowRing.setAttribute('fill', color);
      glowRing.setAttribute('fill-opacity', '0.12');
      glowRing.setAttribute('stroke', 'none');
      g.appendChild(glowRing);
    }

    // Main circle
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', cx);
    circle.setAttribute('cy', cy);
    circle.setAttribute('r', R);

    if (isActive) {
      circle.setAttribute('fill', color);
      circle.setAttribute('fill-opacity', '0.25');
      circle.setAttribute('stroke', color);
      circle.setAttribute('stroke-width', '4');
      circle.setAttribute('filter', 'url(#glowCyan)');
    } else if (isVisited) {
      circle.setAttribute('fill', 'rgba(51,255,136,0.08)');
      circle.setAttribute('stroke', 'rgba(51,255,136,0.35)');
      circle.setAttribute('stroke-width', '2');
    } else {
      circle.setAttribute('fill', 'rgba(255,255,255,0.03)');
      circle.setAttribute('stroke', 'rgba(255,255,255,0.15)');
      circle.setAttribute('stroke-width', '2');
    }

    g.appendChild(circle);

    // Step number label inside
    const numText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    numText.setAttribute('x', cx);
    numText.setAttribute('y', cy + 6);
    numText.setAttribute('text-anchor', 'middle');
    numText.setAttribute('font-family', 'Orbitron, monospace');
    numText.setAttribute('font-size', '14');
    numText.setAttribute('font-weight', '900');
    numText.setAttribute('fill', isActive ? color : isVisited ? 'rgba(51,255,136,0.7)' : 'rgba(255,255,255,0.3)');
    numText.textContent = step.id;
    g.appendChild(numText);

    // Node label below
    const labelText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    labelText.setAttribute('x', cx);
    labelText.setAttribute('y', cy + R + 20);
    labelText.setAttribute('text-anchor', 'middle');
    labelText.setAttribute('font-family', 'Orbitron, monospace');
    labelText.setAttribute('font-size', '11');
    labelText.setAttribute('font-weight', '700');
    labelText.setAttribute('fill', isActive ? color : isVisited ? 'rgba(51,255,136,0.55)' : 'rgba(255,255,255,0.22)');
    labelText.setAttribute('letter-spacing', '0.5');

    // Shorten labels to fit circles
    const SHORT = [
      "HEALTH","CATALYST","FORM4","SETUP","T1 SCORE","ENRICH",
      "T2 FUND","T3 FLOW","T4 PATT","T5 COUNT",
      "EXEC","BUDGET",
      "SKEPTIC","CONTRA","REGIME","OPT FLOW","FORM4I","KRONOS",
      "CALIB","META"
    ];
    labelText.textContent = SHORT[i];
    g.appendChild(labelText);

    // Click handler
    g.addEventListener('click', () => goToStep(i));

    nodesG.appendChild(g);
  });

  /* --- Move ball --- */
  moveBall(currentStep);
}

/* ================================================================
   MOVE BALL
   ================================================================ */
function moveBall(stepIdx) {
  const [cx, cy] = NODE_POS[stepIdx];
  const outer = document.getElementById('ballOuter');
  const ring  = document.getElementById('ballRing');
  const core  = document.getElementById('ballCore');

  [outer, ring, core].forEach(el => {
    el.setAttribute('cx', cx);
    el.setAttribute('cy', cy);
    el.style.transition = 'cx 0.45s cubic-bezier(0.4,0,0.2,1), cy 0.45s cubic-bezier(0.4,0,0.2,1)';
  });

  // Update ball color to group color
  const color = GROUP_COLOR[STEPS[stepIdx].group];
  outer.setAttribute('fill', hexToRgba(color, 0.18));
  ring.setAttribute('stroke', color);
  core.setAttribute('fill', 'url(#ballGrad)');
}

/* ================================================================
   UPDATE DETAIL PANEL
   ================================================================ */
function updateDetail() {
  const step  = STEPS[currentStep];
  const color = GROUP_COLOR[step.group];

  const panel = document.getElementById('detailPanel');
  panel.style.setProperty('--step-color', color);

  document.getElementById('detailStepNum').textContent =
    `STEP ${step.id} OF 20 — ${GROUP_LABEL[step.group]}`;

  const titleEl = document.getElementById('detailTitle');
  titleEl.textContent = step.title;
  titleEl.style.color = color;
  titleEl.style.textShadow = `0 0 20px ${hexToRgba(color, 0.5)}`;

  document.getElementById('detailDesc').textContent = step.desc;
  document.getElementById('detailTable').textContent = step.table;

  const costEl = document.getElementById('detailCost');
  costEl.textContent = step.cost;
  costEl.className = 'chip-value';
  if (step.cost === 'Free') {
    costEl.classList.add('cost-free');
  } else if (step.cost.includes('GPU') || step.cost.includes('Ollama')) {
    costEl.classList.add('cost-gpu');
  } else {
    costEl.classList.add('cost-api');
  }

  document.getElementById('detailGroup').textContent = GROUP_LABEL[step.group];

  // Panel fade animation
  panel.classList.remove('animating');
  void panel.offsetWidth;
  panel.classList.add('animating');
}

/* ================================================================
   UPDATE DB STRIP
   ================================================================ */
function updateDbStrip() {
  const activeTable = STEPS[currentStep].table;
  document.querySelectorAll('.db-badge').forEach(badge => {
    if (badge.dataset.table === activeTable) {
      badge.classList.add('active');
    } else {
      badge.classList.remove('active');
    }
  });
}

/* ================================================================
   UPDATE PROGRESS & COUNTERS
   ================================================================ */
function updateProgress() {
  const pct = ((currentStep + 1) / STEPS.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('stepCounter').textContent =
    `STEP ${currentStep + 1} OF ${STEPS.length}`;

  // Dots
  document.querySelectorAll('.dot').forEach((dot, i) => {
    dot.classList.remove('active', 'visited');
    if (i === currentStep) dot.classList.add('active');
    else if (visitedSteps.has(i)) dot.classList.add('visited');
  });

  // Nav buttons
  document.getElementById('btnPrev').disabled = currentStep === 0;
  document.getElementById('btnNext').disabled = currentStep === STEPS.length - 1;
}

/* ================================================================
   UPDATE PLAY/PAUSE BUTTON APPEARANCE
   ================================================================ */
function syncPlayPauseBtn() {
  const btn = document.getElementById('btnPlayPause');
  if (isPlaying) {
    btn.textContent = '⏸ PAUSE';
    btn.classList.add('playing');
  } else {
    btn.textContent = '▶ PLAY';
    btn.classList.remove('playing');
  }
}

/* ================================================================
   GO TO STEP
   ================================================================ */
function goToStep(idx) {
  if (idx < 0 || idx >= STEPS.length) return;
  currentStep = idx;
  visitedSteps.add(idx);
  renderDiagram();
  updateDetail();
  updateDbStrip();
  updateProgress();
}

/* ================================================================
   NAVIGATE
   ================================================================ */
function navigate(delta) {
  const next = currentStep + delta;
  if (next < 0 || next >= STEPS.length) return;
  goToStep(next);
}

/* ================================================================
   PLAY / PAUSE
   ================================================================ */
function togglePlayPause() {
  if (isPlaying) {
    // Pause
    clearInterval(autoTimer);
    autoTimer = null;
    isPlaying = false;
  } else {
    // Play from current position
    isPlaying = true;
    autoTimer = setInterval(() => {
      if (currentStep >= STEPS.length - 1) {
        goToStep(0);
      } else {
        navigate(1);
      }
    }, 3000);
  }
  syncPlayPauseBtn();
}

/* ================================================================
   STOP — halt and reset to step 1
   ================================================================ */
function stopPlay() {
  if (autoTimer) {
    clearInterval(autoTimer);
    autoTimer = null;
  }
  isPlaying = false;
  visitedSteps = new Set([0]);
  goToStep(0);
  syncPlayPauseBtn();
}

/* ================================================================
   RESTART — jump to step 1, start auto-playing
   ================================================================ */
function restartPlay() {
  if (autoTimer) {
    clearInterval(autoTimer);
    autoTimer = null;
  }
  visitedSteps = new Set([0]);
  goToStep(0);
  isPlaying = true;
  autoTimer = setInterval(() => {
    if (currentStep >= STEPS.length - 1) {
      goToStep(0);
    } else {
      navigate(1);
    }
  }, 3000);
  syncPlayPauseBtn();
}

/* ================================================================
   UTILITY
   ================================================================ */
function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

/* ================================================================
   INIT
   ================================================================ */
function init() {
  // Build DB strip badges
  const strip = document.getElementById('dbStrip');
  ALL_TABLES.forEach(tbl => {
    const badge = document.createElement('span');
    badge.className = 'db-badge';
    badge.dataset.table = tbl;
    badge.textContent = tbl.replace(/_/g, '_\u200B'); // zero-width space for wrap hints
    strip.appendChild(badge);
  });

  // Build progress dots
  const dotRow = document.getElementById('dotProgress');
  STEPS.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot';
    dot.title = STEPS[i].title;
    dot.addEventListener('click', () => goToStep(i));
    dotRow.appendChild(dot);
  });

  // First render
  goToStep(0);
  syncPlayPauseBtn();
}

// Wait for fonts
document.fonts.ready.then(init);
</script>
</body>
</html>
