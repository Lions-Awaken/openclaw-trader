<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw Trader — Sign In</title>
<style>
  :root {
    --bg: #0a0a0f;
    --card: #12121a;
    --border: #1e1e2e;
    --text: #e0e0e8;
    --dim: #6b6b80;
    --cyan: #22d3ee;
    --purple: #8b5cf6;
    --red: #ef4444;
    --green: #22c55e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      linear-gradient(rgba(34, 211, 238, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(34, 211, 238, 0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridMove 20s linear infinite;
    z-index: 0;
  }

  @keyframes gridMove {
    0% { transform: translate(0, 0); }
    100% { transform: translate(60px, 60px); }
  }

  /* Ambient glow */
  body::after {
    content: '';
    position: fixed;
    top: 50%; left: 50%;
    width: 600px; height: 600px;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(139, 92, 246, 0.08) 0%, transparent 70%);
    z-index: 0;
    pointer-events: none;
  }

  .login-container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    padding: 0 20px;
  }

  .login-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    box-shadow:
      0 4px 40px rgba(0, 0, 0, 0.4),
      0 0 80px rgba(139, 92, 246, 0.06);
    backdrop-filter: blur(20px);
  }

  /* Logo / Brand */
  .brand {
    text-align: center;
    margin-bottom: 36px;
  }

  .brand-icon {
    width: 56px;
    height: 56px;
    margin: 0 auto 16px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--cyan), var(--purple));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    box-shadow: 0 4px 20px rgba(34, 211, 238, 0.2);
  }

  .brand h1 {
    font-size: 1.5rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--cyan), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }

  .brand p {
    color: var(--dim);
    font-size: 0.85rem;
    margin-top: 6px;
  }

  /* Form */
  .form-group {
    margin-bottom: 20px;
  }

  .form-group label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .input-wrapper {
    position: relative;
  }

  .input-wrapper input {
    width: 100%;
    padding: 14px 16px 14px 44px;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 0.95rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-wrapper input:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.1);
  }

  .input-wrapper input::placeholder {
    color: rgba(107, 107, 128, 0.6);
  }

  .input-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--dim);
    font-size: 1.1rem;
    pointer-events: none;
  }

  .toggle-password {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--dim);
    cursor: pointer;
    font-size: 0.8rem;
    padding: 4px 8px;
    border-radius: 4px;
    transition: color 0.2s;
  }

  .toggle-password:hover {
    color: var(--cyan);
  }

  /* Submit button */
  .submit-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, rgba(34, 211, 238, 0.15), rgba(139, 92, 246, 0.15));
    border: 1px solid rgba(34, 211, 238, 0.3);
    border-radius: 10px;
    color: var(--cyan);
    font-size: 0.95rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .submit-btn:hover {
    background: linear-gradient(135deg, rgba(34, 211, 238, 0.25), rgba(139, 92, 246, 0.25));
    border-color: var(--cyan);
    box-shadow: 0 0 20px rgba(34, 211, 238, 0.15);
    transform: translateY(-1px);
  }

  .submit-btn:active {
    transform: translateY(0);
  }

  .submit-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  /* Error message */
  .error {
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid rgba(239, 68, 68, 0.3);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 20px;
    color: var(--red);
    font-size: 0.85rem;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .error::before {
    content: '\26A0';
    font-size: 1rem;
  }

  /* Footer */
  .login-footer {
    text-align: center;
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .login-footer p {
    color: var(--dim);
    font-size: 0.75rem;
  }

  .login-footer .status-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    margin-right: 6px;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Security badges */
  .security-badges {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-top: 12px;
  }

  .badge {
    font-size: 0.7rem;
    color: var(--dim);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .badge svg {
    width: 12px;
    height: 12px;
    fill: currentColor;
  }

  /* Responsive */
  @media (max-width: 480px) {
    .login-card {
      padding: 36px 24px;
    }
  }
</style>
</head>
<body>

<div class="login-container">
  <div class="login-card">
    <div class="brand">
      <div class="brand-icon">&#x1F4C8;</div>
      <h1>OpenClaw Trader</h1>
      <p>Autonomous Trading Dashboard</p>
    </div>

    <!-- ERROR_PLACEHOLDER -->

    <form method="POST" action="/login" id="loginForm">
      <input type="hidden" name="csrf_token" value="CSRF_TOKEN_PLACEHOLDER">

      <div class="form-group">
        <label for="password">Access Key</label>
        <div class="input-wrapper">
          <span class="input-icon">&#x1F511;</span>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your access key"
            autocomplete="current-password"
            required
            autofocus
          >
          <button type="button" class="toggle-password" onclick="togglePw()">SHOW</button>
        </div>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">
        Sign In
      </button>
    </form>

    <div class="login-footer">
      <p><span class="status-dot"></span>System Online &mdash; Paper Trading Mode</p>
      <div class="security-badges">
        <span class="badge">
          <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
          CSRF Protected
        </span>
        <span class="badge">
          <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
          Rate Limited
        </span>
        <span class="badge">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
          Secure Session
        </span>
      </div>
    </div>
  </div>
</div>

<script>
function togglePw() {
  const pw = document.getElementById('password');
  const btn = document.querySelector('.toggle-password');
  if (pw.type === 'password') {
    pw.type = 'text';
    btn.textContent = 'HIDE';
  } else {
    pw.type = 'password';
    btn.textContent = 'SHOW';
  }
}

// Fetch CSRF token on page load
fetch('/login', { method: 'GET', credentials: 'same-origin' })
  .then(r => {
    const csrf = r.headers.get('X-CSRF-Token');
    if (csrf) {
      document.querySelector('input[name="csrf_token"]').value = csrf;
    }
  })
  .catch(() => {});

// Disable button on submit to prevent double-click
document.getElementById('loginForm').addEventListener('submit', function() {
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Signing in...';
});
</script>
</body>
</html>
