<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw // Terminal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  :root {
    --phosphor: #33ff88;
    --phosphor-dim: rgba(51, 255, 136, 0.4);
    --phosphor-glow: rgba(51, 255, 136, 0.12);
    --amber: #ffaa22;
    --bg: #030805;
    --red: #ff3344;
    --red-glow: rgba(255, 51, 68, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    background: var(--bg);
    color: var(--phosphor);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* CRT scanlines */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      rgba(0, 0, 0, 0) 0px,
      rgba(0, 0, 0, 0) 1px,
      rgba(0, 0, 0, 0.15) 1px,
      rgba(0, 0, 0, 0.15) 2px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* CRT vignette */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0, 0, 0, 0.6) 100%);
    pointer-events: none;
    z-index: 99;
  }

  /* Screen flicker */
  @keyframes flicker {
    0% { opacity: 0.97; }
    5% { opacity: 0.95; }
    10% { opacity: 0.98; }
    15% { opacity: 0.96; }
    20% { opacity: 0.99; }
    50% { opacity: 0.97; }
    80% { opacity: 0.98; }
    90% { opacity: 0.96; }
    100% { opacity: 0.97; }
  }

  .crt-screen {
    animation: flicker 4s infinite;
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
    padding: 0 20px;
  }

  /* Terminal frame */
  .terminal {
    border: 1px solid rgba(51, 255, 136, 0.2);
    border-radius: 4px;
    padding: 32px 36px;
    background: rgba(3, 8, 5, 0.95);
    box-shadow:
      0 0 60px rgba(51, 255, 136, 0.04),
      inset 0 0 80px rgba(51, 255, 136, 0.02);
    position: relative;
  }

  /* Terminal header bar */
  .term-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(51, 255, 136, 0.15);
    font-size: 0.7rem;
    color: var(--phosphor-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .term-header .term-dots {
    display: flex;
    gap: 6px;
  }
  .term-header .term-dot {
    width: 8px; height: 8px; border-radius: 50%;
    border: 1px solid rgba(51, 255, 136, 0.3);
  }

  /* ASCII brand */
  .ascii-brand {
    text-align: center;
    margin-bottom: 28px;
    font-size: 0.65rem;
    line-height: 1.2;
    color: var(--phosphor-dim);
    white-space: pre;
    text-shadow: 0 0 8px var(--phosphor-glow);
  }

  .system-id {
    text-align: center;
    font-size: 0.85rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 6px;
    text-shadow: 0 0 12px var(--phosphor-glow);
  }

  .system-sub {
    text-align: center;
    font-size: 0.7rem;
    color: var(--phosphor-dim);
    letter-spacing: 2px;
    margin-bottom: 28px;
  }

  /* Typing cursor */
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .cursor {
    display: inline-block;
    width: 8px;
    height: 14px;
    background: var(--phosphor);
    margin-left: 2px;
    animation: blink 1s step-end infinite;
    vertical-align: text-bottom;
  }

  /* Boot log lines */
  .boot-log {
    margin-bottom: 24px;
    font-size: 0.72rem;
    line-height: 1.8;
    color: var(--phosphor-dim);
  }
  .boot-log .ok { color: var(--phosphor); }
  .boot-log .warn { color: var(--amber); }

  /* Input area */
  .prompt-line {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    font-size: 0.8rem;
  }

  .prompt-symbol {
    color: var(--phosphor);
    font-weight: bold;
    flex-shrink: 0;
  }

  .key-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--phosphor);
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    font-size: 0.85rem;
    caret-color: var(--phosphor);
    letter-spacing: 1px;
  }

  .key-input::placeholder {
    color: rgba(51, 255, 136, 0.2);
  }

  .input-underline {
    height: 1px;
    background: linear-gradient(90deg, var(--phosphor), transparent);
    margin-bottom: 24px;
    opacity: 0.3;
    transition: opacity 0.3s;
  }
  .key-input:focus ~ .nope,
  .input-area:focus-within .input-underline {
    opacity: 0.7;
  }

  /* Submit */
  .submit-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .submit-btn {
    background: transparent;
    border: 1px solid rgba(51, 255, 136, 0.3);
    color: var(--phosphor);
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    font-size: 0.8rem;
    padding: 10px 28px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .submit-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, var(--phosphor-glow), transparent);
    transition: left 0.4s;
  }

  .submit-btn:hover::before { left: 100%; }
  .submit-btn:hover {
    border-color: var(--phosphor);
    box-shadow: 0 0 20px var(--phosphor-glow);
    text-shadow: 0 0 8px var(--phosphor-glow);
  }

  .submit-btn:disabled {
    opacity: 0.3;
    cursor: default;
  }

  .status-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.7rem;
    color: var(--phosphor-dim);
    letter-spacing: 1px;
  }

  .status-dot-live {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--phosphor);
    animation: blink 2s ease-in-out infinite;
  }

  /* Error state */
  .error {
    padding: 10px 14px;
    margin-bottom: 20px;
    border-left: 2px solid var(--red);
    background: var(--red-glow);
    color: var(--red);
    font-size: 0.78rem;
    letter-spacing: 0.5px;
    line-height: 1.6;
  }

  .error::before {
    content: '[ERR] ';
    font-weight: bold;
  }

  /* Footer */
  .term-footer {
    margin-top: 20px;
    padding-top: 12px;
    border-top: 1px solid rgba(51, 255, 136, 0.1);
    display: flex;
    justify-content: space-between;
    font-size: 0.6rem;
    color: rgba(51, 255, 136, 0.25);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ================================================ */
  /* ACCESS GRANTED overlay                           */
  /* ================================================ */
  .access-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 200;
    background: var(--bg);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', 'Courier New', monospace;
  }

  .access-overlay.active {
    display: flex;
  }

  /* Scanlines on overlay too */
  .access-overlay::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      rgba(0, 0, 0, 0) 0px,
      rgba(0, 0, 0, 0) 1px,
      rgba(0, 0, 0, 0.15) 1px,
      rgba(0, 0, 0, 0.15) 2px
    );
    pointer-events: none;
    z-index: 201;
  }

  @keyframes glitchIn {
    0% { opacity: 0; transform: translateX(-20px) skewX(-5deg); filter: blur(4px); }
    20% { opacity: 1; transform: translateX(5px) skewX(2deg); filter: blur(0); }
    30% { transform: translateX(-3px) skewX(-1deg); }
    40% { transform: translateX(2px) skewX(0.5deg); }
    50% { transform: translateX(0) skewX(0); }
    100% { opacity: 1; transform: translateX(0) skewX(0); }
  }

  @keyframes grantedPulse {
    0% { text-shadow: 0 0 10px var(--phosphor-glow); }
    50% { text-shadow: 0 0 40px rgba(51, 255, 136, 0.5), 0 0 80px rgba(51, 255, 136, 0.2); }
    100% { text-shadow: 0 0 10px var(--phosphor-glow); }
  }

  @keyframes lineExpand {
    0% { width: 0; }
    100% { width: 300px; }
  }

  @keyframes fadeUp {
    0% { opacity: 0; transform: translateY(10px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .granted-text {
    font-size: 2.8rem;
    font-weight: bold;
    color: var(--phosphor);
    letter-spacing: 12px;
    text-transform: uppercase;
    animation: glitchIn 0.6s ease-out, grantedPulse 2s ease-in-out 0.6s infinite;
    text-shadow: 0 0 20px var(--phosphor-glow);
  }

  .granted-line {
    width: 0;
    height: 1px;
    background: var(--phosphor);
    margin: 16px 0;
    animation: lineExpand 0.4s ease-out 0.3s forwards;
    box-shadow: 0 0 8px var(--phosphor-glow);
  }

  .granted-sub {
    font-size: 0.8rem;
    color: var(--phosphor-dim);
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 0.4s ease-out 0.7s forwards;
  }

  .granted-loading {
    margin-top: 24px;
    font-size: 0.7rem;
    color: rgba(51, 255, 136, 0.3);
    letter-spacing: 2px;
    opacity: 0;
    animation: fadeUp 0.3s ease-out 1.2s forwards;
  }

  .granted-loading .loading-bar {
    width: 200px;
    height: 2px;
    background: rgba(51, 255, 136, 0.1);
    margin-top: 8px;
    border-radius: 1px;
    overflow: hidden;
  }

  .granted-loading .loading-fill {
    height: 100%;
    background: var(--phosphor);
    width: 0;
    animation: loadFill 1s ease-in-out 1.4s forwards;
    box-shadow: 0 0 6px var(--phosphor);
  }

  @keyframes loadFill {
    0% { width: 0; }
    100% { width: 100%; }
  }

  /* DENIED shake */
  @keyframes denied-shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  .denied-shake {
    animation: denied-shake 0.4s ease-out;
  }

  @media (max-width: 480px) {
    .terminal { padding: 24px 20px; }
    .granted-text { font-size: 1.8rem; letter-spacing: 8px; }
    .ascii-brand { font-size: 0.5rem; }
  }
</style>
</head>
<body>

<!-- ACCESS GRANTED overlay -->
<div class="access-overlay" id="accessOverlay">
  <div class="granted-text">ACCESS GRANTED</div>
  <div class="granted-line"></div>
  <div class="granted-sub">Initializing secure session</div>
  <div class="granted-loading">
    LOADING DASHBOARD
    <div class="loading-bar"><div class="loading-fill"></div></div>
  </div>
</div>

<div class="crt-screen">
  <div class="terminal" id="terminal">

    <div class="term-header">
      <div class="term-dots">
        <div class="term-dot"></div>
        <div class="term-dot"></div>
        <div class="term-dot"></div>
      </div>
      <span>openclaw://auth</span>
    </div>

    <div class="ascii-brand" id="asciiBrand"></div>

    <div class="system-id">OPENCLAW TRADER</div>
    <div class="system-sub">Autonomous Trading Terminal v4.6</div>

    <div class="boot-log" id="bootLog"></div>

    <!-- ERROR_PLACEHOLDER -->

    <form id="loginForm" onsubmit="return handleSubmit(event)">
      <input type="hidden" name="csrf_token" id="csrfToken" value="CSRF_TOKEN_PLACEHOLDER">

      <div class="input-area">
        <div class="prompt-line">
          <span class="prompt-symbol">&gt;</span>
          <input
            type="password"
            id="password"
            name="password"
            class="key-input"
            placeholder="enter access key"
            autocomplete="current-password"
            required
            autofocus
          >
        </div>
        <div class="input-underline"></div>
      </div>

      <div class="submit-row">
        <button type="submit" class="submit-btn" id="submitBtn">AUTHENTICATE</button>
        <div class="status-indicator">
          <div class="status-dot-live"></div>
          <span>SYSTEM ONLINE</span>
        </div>
      </div>
    </form>

    <div class="term-footer">
      <span>CSRF PROTECTED</span>
      <span>RATE LIMITED</span>
      <span>ENCRYPTED SESSION</span>
    </div>
  </div>
</div>

<script>
// === ASCII art typed on load ===
const ASCII_ART = [
  '    ___  ____  _____ _  __  _____ _      _   _    __',
  '   / _ \\|  _ \\| ____| \\| |/ ____| |    / \\ | |  / /',
  '  | | | | |_) |  _| |  ` | |    | |   / _ \\| | / / ',
  '  | |_| |  __/| |___| |\\  | |____| |_ / ___ \\ |/ /  ',
  '   \\___/|_|   |_____|_| \\_|\\_____|___/_/   \\_\\__/   ',
];

const BOOT_LINES = [
  ['[SYS]  kernel loaded', 'ok'],
  ['[NET]  supabase connection .... established', 'ok'],
  ['[GPU]  ollama runtime ......... standing by', 'ok'],
  ['[MKT]  alpaca api ............. authenticated', 'ok'],
  ['[SEC]  session encryption ..... active', 'ok'],
  ['', ''],
  ['AWAITING OPERATOR CREDENTIALS', 'warn'],
];

// Type out ASCII art
const brandEl = document.getElementById('asciiBrand');
let artIdx = 0;
function typeArt() {
  if (artIdx < ASCII_ART.length) {
    brandEl.textContent += ASCII_ART[artIdx] + '\n';
    artIdx++;
    setTimeout(typeArt, 60);
  } else {
    typeBoot();
  }
}

// Type boot log lines
const bootEl = document.getElementById('bootLog');
let bootIdx = 0;
function typeBoot() {
  if (bootIdx < BOOT_LINES.length) {
    const [text, cls] = BOOT_LINES[bootIdx];
    if (text) {
      const line = document.createElement('div');
      line.innerHTML = '<span class="' + cls + '">' + text + '</span>';
      bootEl.appendChild(line);
    } else {
      bootEl.appendChild(document.createElement('br'));
    }
    bootIdx++;
    setTimeout(typeBoot, 80);
  }
}

// Start after small delay
setTimeout(typeArt, 200);

// === CSRF fetch ===
fetch('/login', { method: 'GET', credentials: 'same-origin' })
  .then(r => {
    const csrf = r.headers.get('X-CSRF-Token');
    if (csrf) document.getElementById('csrfToken').value = csrf;
  })
  .catch(() => {});

// === Form submission with animation ===
async function handleSubmit(e) {
  e.preventDefault();

  const btn = document.getElementById('submitBtn');
  const pw = document.getElementById('password');
  const terminal = document.getElementById('terminal');
  const csrf = document.getElementById('csrfToken').value;

  btn.disabled = true;
  btn.textContent = 'VERIFYING...';

  try {
    const formData = new URLSearchParams();
    formData.append('password', pw.value);
    formData.append('csrf_token', csrf);

    const resp = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: formData.toString(),
      credentials: 'same-origin',
      redirect: 'manual',
    });

    // 302 redirect = success (browser follows it for normal forms, but fetch with redirect:manual gives opaqueredirect)
    if (resp.type === 'opaqueredirect' || resp.status === 302 || resp.status === 200) {
      // Check if we actually got redirected (success) or got an error page back
      if (resp.type === 'opaqueredirect' || resp.status === 302) {
        showAccessGranted();
        return false;
      }

      // If 200 but has error content, it's a failed login returned as HTML
      const text = await resp.text();
      if (text.includes('class="error"')) {
        showDenied(terminal, btn, pw);
        // Re-fetch CSRF for next attempt
        const csrfResp = await fetch('/login', { credentials: 'same-origin' });
        const newCsrf = csrfResp.headers.get('X-CSRF-Token');
        if (newCsrf) document.getElementById('csrfToken').value = newCsrf;
        return false;
      }

      // Ambiguous 200 — might be success with cookie set
      showAccessGranted();
      return false;
    }

    // 401, 403, 429 = explicit failure
    showDenied(terminal, btn, pw);
    // Re-fetch CSRF
    const csrfResp = await fetch('/login', { credentials: 'same-origin' });
    const newCsrf = csrfResp.headers.get('X-CSRF-Token');
    if (newCsrf) document.getElementById('csrfToken').value = newCsrf;

  } catch (err) {
    // Network error — try normal form submit as fallback
    document.getElementById('loginForm').action = '/login';
    document.getElementById('loginForm').method = 'POST';
    document.getElementById('loginForm').onsubmit = null;
    document.getElementById('loginForm').submit();
  }

  return false;
}

function showAccessGranted() {
  document.getElementById('accessOverlay').classList.add('active');
  // Redirect after animation plays
  setTimeout(() => {
    window.location.href = '/';
  }, 2600);
}

function showDenied(terminal, btn, pw) {
  terminal.classList.add('denied-shake');
  setTimeout(() => terminal.classList.remove('denied-shake'), 500);

  // Flash red momentarily
  terminal.style.borderColor = 'rgba(255, 51, 68, 0.4)';
  terminal.style.boxShadow = '0 0 40px rgba(255, 51, 68, 0.1)';
  setTimeout(() => {
    terminal.style.borderColor = '';
    terminal.style.boxShadow = '';
  }, 800);

  // Add denial line to boot log
  const bootEl = document.getElementById('bootLog');
  const line = document.createElement('div');
  line.innerHTML = '<span style="color:var(--red)">[AUTH] ACCESS DENIED — invalid credentials</span>';
  bootEl.appendChild(line);

  btn.disabled = false;
  btn.textContent = 'AUTHENTICATE';
  pw.value = '';
  pw.focus();
}
</script>
</body>
</html>
